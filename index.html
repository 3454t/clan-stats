<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Статистика клана Славянские воины</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b09;
      --panel: rgba(18, 23, 19, .94);
      --panel-2: rgba(27, 33, 26, .92);
      --line: rgba(196, 173, 116, .18);
      --line-strong: rgba(232, 165, 70, .42);
      --text: #e9e4d4;
      --muted: #9d9888;
      --accent: #e9a13d;
      --accent-2: #98b85d;
      --danger: #d76243;
      --good: #a6cc64;
      --shadow: 0 24px 80px rgba(0,0,0,.55);
      font-family: "Bahnschrift", "Arial Narrow", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 78% 18%, rgba(120, 33, 28, .34), transparent 26rem),
        radial-gradient(circle at 42% 92%, rgba(155, 85, 22, .22), transparent 30rem),
        radial-gradient(circle at 12% 36%, rgba(75, 66, 39, .18), transparent 26rem),
        linear-gradient(180deg, rgba(12, 9, 7, .86), rgba(8, 8, 7, .96)),
        #0d0c09;
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background:
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        radial-gradient(circle at 52% 50%, transparent 0 28rem, rgba(0,0,0,.58) 52rem);
      background-size: 64px 64px, 64px 64px, auto;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .20;
      background:
        repeating-linear-gradient(0deg, transparent 0 5px, rgba(255,255,255,.035) 5px 6px),
        linear-gradient(115deg, transparent 0 45%, rgba(233,161,61,.08) 45% 46%, transparent 46% 100%);
    }

    button, input { font: inherit; }

    .app {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
      position: relative;
      z-index: 1;
    }

    .app::before {
      content: "";
      position: absolute;
      left: -24px;
      right: -24px;
      top: 176px;
      bottom: 14px;
      pointer-events: none;
      border: 2px solid rgba(235,235,235,.82);
      clip-path: polygon(0 0, 3.5% 0, 3.5% 2px, 2px 2px, 2px 5.8%, 0 5.8%, 0 0, 100% 0, 100% 5.8%, calc(100% - 2px) 5.8%, calc(100% - 2px) 2px, 96.5% 2px, 96.5% 0, 100% 0, 100% 100%, 96.5% 100%, 96.5% calc(100% - 2px), calc(100% - 2px) calc(100% - 2px), calc(100% - 2px) 94.2%, 100% 94.2%, 100% 100%, 0 100%, 0 94.2%, 2px 94.2%, 2px calc(100% - 2px), 3.5% calc(100% - 2px), 3.5% 100%, 0 100%);
      opacity: .9;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 56px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      display: none;
    }

    .mark svg { display: none; }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.04;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: none;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      min-width: 420px;
    }

    .status {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: rgba(12,15,12,.82);
      color: var(--muted);
      border-radius: 0;
      font-size: 13px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: var(--accent-2);
      box-shadow: 0 0 18px var(--accent-2);
    }

    .source-link {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 0;
      border: 1px solid var(--line-strong);
      color: var(--text);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(233,161,61,.18), rgba(38,29,16,.34));
      font-size: 13px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(360px, .85fr) minmax(0, 1.15fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .hero,
    .toolbar,
    .grid {
      position: relative;
      z-index: 1;
    }

    .panel {
      position: relative;
      border: 1px solid rgba(235,235,235,.42);
      background:
        linear-gradient(180deg, rgba(48,48,47,.22), transparent 58px),
        radial-gradient(circle at 88% 12%, rgba(111,38,30,.18), transparent 16rem),
        rgba(18,18,17,.88);
      backdrop-filter: none;
      border-radius: 0;
      box-shadow: 0 18px 44px rgba(0,0,0,.46);
      overflow: hidden;
      clip-path: none;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-top: 1px solid rgba(255,255,255,.22);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.65);
    }

    .leader {
      position: relative;
      min-height: 238px;
      padding: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      isolation: isolate;
    }

    .leader::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(180deg, rgba(51,51,51,.96) 0 46px, rgba(20,20,18,.82) 46px),
        radial-gradient(circle at 72% 42%, rgba(233,161,61,.12), transparent 18rem);
    }

    .leader::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: none;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .leader-body {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: end;
      padding: 22px 20px 18px;
      min-height: 190px;
    }

    .leader-name {
      margin: 0;
      white-space: nowrap;
      font-size: clamp(30px, 3.35vw, 46px);
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .leader-score {
      display: flex;
      align-items: baseline;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,.12);
      padding-top: 12px;
    }

    .leader-score span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .leader-score strong {
      color: var(--accent);
      font-size: 34px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .leader-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .chip {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid rgba(196,173,116,.18);
      background: rgba(10,12,10,.54);
      border-radius: 0;
      color: #dad2bd;
      font-size: 13px;
    }

    .summary {
      padding: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      align-content: stretch;
    }

    .summary-title {
      grid-column: 1 / -1;
      padding: 12px 16px;
      background: #333;
      border-bottom: 1px solid rgba(235,235,235,.22);
      color: #d8d8d8;
      font-size: 16px;
      text-transform: uppercase;
    }

    .metric {
      padding: 18px 16px;
      min-height: 126px;
      border: 0;
      border-right: 1px solid rgba(235,235,235,.14);
      border-bottom: 1px solid rgba(235,235,235,.10);
      background:
        radial-gradient(circle at 80% 16%, rgba(233,161,61,.055), transparent 9rem),
        rgba(9,9,8,.62);
      border-radius: 0;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      font-size: 16px;
      line-height: 1.18;
      overflow-wrap: normal;
      color: #f1d9a9;
    }

    .metric-name,
    .metric-number {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-name:empty {
      display: none;
    }

    .metric-number {
      margin-top: 7px;
      color: var(--accent);
      font-size: 28px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 0;
      margin-bottom: 16px;
      background:
        linear-gradient(180deg, rgba(38,38,37,.88), rgba(24,24,23,.88)),
        radial-gradient(circle at 80% 0%, rgba(233,161,61,.08), transparent 16rem);
    }

    .tabs, .stat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tab {
      height: 52px;
      padding: 0 18px;
      border: 0;
      border-right: 1px solid rgba(255,255,255,.08);
      border-radius: 0;
      background: #1c1c1b;
      color: #c8c8c8;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0;
    }

    .tab.active {
      color: #ff4e3b;
      border-color: rgba(255,255,255,.08);
      background: #202020;
      font-weight: 500;
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .search {
      width: min(320px, 100%);
      height: 52px;
      border: 0;
      border-left: 1px solid rgba(255,255,255,.08);
      background: #181817;
      color: var(--text);
      border-radius: 0;
      padding: 0 16px;
      outline: none;
    }

    .search:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 3px rgba(233,161,61,.12);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr);
      gap: 16px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      padding: 0 16px;
      background: #333;
      border-bottom: 1px solid rgba(255,255,255,.16);
    }

    .section-head h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: #d6d6d6;
      font-weight: 500;
    }

    .table-wrap { overflow: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    th, td {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.055);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: #9c9c9c;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
      background: #151514;
      font-weight: 500;
    }

    tbody tr {
      background:
        linear-gradient(90deg, rgba(233,161,61,.028), transparent 26%),
        rgba(23,23,22,.86);
    }

    tbody tr:nth-child(2n) {
      background:
        linear-gradient(90deg, rgba(255,255,255,.018), transparent 28%),
        rgba(21,21,20,.84);
    }

    tbody tr:hover {
      background: #242422;
    }

    .rank {
      width: 64px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .player {
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 760;
    }

    .value {
      font-variant-numeric: tabular-nums;
      font-weight: 820;
    }

    .bar-cell {
      min-width: 150px;
    }

    .bar {
      height: 8px;
      border-radius: 0;
      background: rgba(0,0,0,.50);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
    }

    .bar i {
      display: block;
      height: 100%;
      width: var(--w, 0%);
      border-radius: inherit;
      background: var(--accent);
      box-shadow: none;
    }

    .podium {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .podium-item {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 100% 0, rgba(233,161,61,.08), transparent 9rem),
        rgba(23,23,22,.82);
      border-radius: 0;
    }

    .medal {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 0;
      background: #2a2a28;
      border: 1px solid rgba(255,255,255,.10);
      color: var(--accent);
      font-weight: 900;
    }

    .podium-name {
      font-weight: 820;
      overflow-wrap: anywhere;
      min-width: 0;
    }

    .podium-mode {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .side-stack {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .admin-list, .squad-list {
      display: grid;
      gap: 0;
      padding: 0;
    }

    .info-row {
      display: grid;
      grid-template-columns: minmax(94px, .8fr) minmax(0, 1fr);
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,.055);
      background: rgba(23,23,22,.86);
    }

    .info-row:nth-child(2n) {
      background: rgba(21,21,20,.84);
    }

    .info-row span:first-child {
      color: var(--muted);
      font-size: 13px;
    }

    .info-row strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      padding: 22px 16px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .topbar, .hero, .grid, .toolbar {
        grid-template-columns: 1fr;
      }

      .actions { justify-content: flex-start; }
      .actions { min-width: 0; flex-wrap: wrap; }
      .search { width: 100%; }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1240px);
        padding-top: 18px;
      }

      .brand {
        align-items: flex-start;
      }

      .mark {
        width: 44px;
        height: 44px;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .leader {
        min-height: 260px;
      }

      .leader-body {
        grid-template-columns: 1fr;
      }

      .status, .source-link {
        width: 100%;
      }

      .grid {
        gap: 12px;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div>
          <h1>Статистика клана<br>Славянские воины</h1>
          <p class="subtitle">Оперативная сводка по К/Д, активности и боевым режимам</p>
        </div>
      </div>
      <div class="actions">
        <div class="status"><span class="dot"></span><span id="syncStatus">Загрузка таблицы</span></div>
        <a class="source-link" href="https://docs.google.com/spreadsheets/d/1qGcPyrFy-Z6CtbyCEm998SA5aq-VAlBEYEG_AcjTU9k/edit?gid=1219557746#gid=1219557746" target="_blank" rel="noreferrer">Источник данных</a>
      </div>
    </header>

    <section class="hero">
      <article class="panel leader" id="leaderCard"></article>
      <aside class="panel summary" id="summary"></aside>
    </section>

    <section class="panel toolbar">
      <div class="tabs" id="modeTabs"></div>
      <input class="search" id="search" type="search" placeholder="Позывной русича">
    </section>

    <section class="grid">
      <article class="panel">
        <div class="section-head">
          <h2 id="tableTitle">Боевой рейтинг</h2>
          <span class="chip" id="countChip">0 русичей</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="rank">Топ</th>
                <th>Ник</th>
                <th>К/Д</th>
                <th>Сила</th>
              </tr>
            </thead>
            <tbody id="ratingRows"></tbody>
          </table>
        </div>
      </article>

      <aside class="side-stack">
        <article class="panel">
          <div class="section-head">
            <h2>Лидеры режимов</h2>
          </div>
          <div class="podium" id="podium"></div>
        </article>

        <article class="panel">
          <div class="section-head">
            <h2>Оперативная инфа</h2>
            <div class="stat-tabs" id="statTabs"></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="rank">Топ</th>
                  <th>Ник</th>
                  <th id="statValueHead">Значение</th>
                </tr>
              </thead>
              <tbody id="statRows"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="section-head">
            <h2>Дружина Славянских воинов</h2>
          </div>
          <div class="admin-list" id="admins"></div>
        </article>
      </aside>
    </section>
  </main>

    const modes = [
      { key: "overall", label: "Общий", cols: [2, 3, 4] },
      { key: "season", label: "Внутри сезона", cols: [6, 7, 8] },
      { key: "offseason", label: "Вне сезона", cols: [10, 11, 12] },
      { key: "tournaments", label: "Турики", cols: [14, 15, 16] },
      { key: "potas", label: "Потасы", cols: [18, 19, 20] }
    ];

    const statModes = [
      { key: "kills", label: "Киллы", cols: [29, 30, 31] },
      { key: "deaths", label: "Смерти", cols: [33, 34, 35] },
      { key: "assists", label: "Помощь", cols: [37, 38, 39] }
    ];

    let appData = { ratings: {}, stats: {}, admins: [] };
    let activeMode = "overall";
    let activeStat = "kills";

    function parseCsv(text) {
      const rows = [];
      let row = [], value = "", quoted = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && quoted && next === '"') {
          value += '"';
          i++;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i++;
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function numberValue(raw) {
      return Number(String(raw || "0").replace(/\s/g, "").replace(",", "."));
    }

    function clean(raw) {
      return String(raw || "").replace(/\u00a0/g, " ").trim();
    }

    function pluralRu(value, one, few, many) {
      const number = Math.abs(Number(value));
      const mod10 = number % 10;
      const mod100 = number % 100;
      if (mod100 >= 11 && mod100 <= 14) return many;
      if (mod10 === 1) return one;
      if (mod10 >= 2 && mod10 <= 4) return few;
      return many;
    }

    function collectTriples(rows, columns, numeric = true) {
      const [rankCol, nameCol, valueCol] = columns;
      return rows.slice(6)
        .map(row => ({
          rank: Number(clean(row[rankCol])),
          name: clean(row[nameCol]),
          value: clean(row[valueCol]),
          number: numeric ? numberValue(row[valueCol]) : Number(clean(row[valueCol]).replace(/\s/g, ""))
        }))
        .filter(item => item.rank && item.name);
    }

    function normalize(rows) {
      const ratings = Object.fromEntries(modes.map(mode => [mode.key, collectTriples(rows, mode.cols)]));
      const stats = Object.fromEntries(statModes.map(mode => [mode.key, collectTriples(rows, mode.cols, false)]));
      const admins = rows.slice(3, 7)
        .map(row => {
          const role = clean(row[23]);
          return { role: role === "Руководитель" ? "Князь" : role, name: clean(row[24]) };
        })
        .filter(item => item.role && item.name && !item.role.includes(":"));

      return { ratings, stats, admins };
    }

    function renderTabs() {
      document.getElementById("modeTabs").innerHTML = modes.map(mode =>
        `<button class="tab ${mode.key === activeMode ? "active" : ""}" type="button" data-mode="${mode.key}">${mode.label}</button>`
      ).join("");

      document.getElementById("statTabs").innerHTML = statModes.map(mode =>
        `<button class="tab ${mode.key === activeStat ? "active" : ""}" type="button" data-stat="${mode.key}">${mode.label}</button>`
      ).join("");
    }

    function renderSummary() {
      const all = appData.ratings.overall || [];
      const kills = appData.stats.kills || [];
      const deaths = appData.stats.deaths || [];
      const assists = appData.stats.assists || [];
      const avg = all.length ? all.reduce((sum, item) => sum + item.number, 0) / all.length : 0;

      const bestKd = all[0];
      const worstDeaths = deaths[0];

      function metric(label, name, value) {
        return `<div class="metric"><span>${label}</span><strong><span class="metric-name">${name}</span><span class="metric-number">${value}</span></strong></div>`;
      }

      document.getElementById("summary").innerHTML = `
        <div class="summary-title">Общая информация клана</div>
        ${metric("Русичей в базе", "", `${all.length} ${pluralRu(all.length, "русич", "русича", "русичей")}`)}
        ${metric("Средний К/Д", "", avg.toFixed(2).replace(".", ","))}
        ${metric("Максимум ликвидаций", kills[0]?.name || "—", kills[0]?.value || "—")}
        ${metric("Поддержка отряда", assists[0]?.name || "—", assists[0]?.value || "—")}
        ${metric("Лучший К/Д", bestKd?.name || "—", bestKd?.value || "—")}
        ${metric("Больше всего смертей", worstDeaths?.name || "—", worstDeaths?.value || "—")}
      `;
    }

    function renderLeader() {
      const mode = modes.find(item => item.key === activeMode);
      const leader = (appData.ratings[activeMode] || [])[0];
      document.getElementById("leaderCard").innerHTML = leader ? `
        <div class="section-head"><h2>Лидер режима · ${mode.label}</h2></div>
        <div class="leader-body">
          <div>
            <p class="eyebrow">Лучший показатель в выбранном режиме</p>
            <h2 class="leader-name">${leader.name}</h2>
            <div class="leader-meta">
              <span class="chip">Позиция #${leader.rank}</span>
            </div>
          </div>
          <div class="leader-score">
            <span>К/Д</span>
            <strong>${leader.value}</strong>
          </div>
        </div>
      ` : `<p class="empty">Нет данных по выбранному режиму.</p>`;
    }

    function renderRating() {
      const query = clean(document.getElementById("search").value).toLowerCase();
      const mode = modes.find(item => item.key === activeMode);
      const items = (appData.ratings[activeMode] || []).filter(item => item.name.toLowerCase().includes(query));
      const max = Math.max(...items.map(item => item.number), 1);

      document.getElementById("tableTitle").textContent = `Боевой рейтинг · ${mode.label}`;
      document.getElementById("countChip").textContent = `${items.length} ${pluralRu(items.length, "русич", "русича", "русичей")}`;
      document.getElementById("ratingRows").innerHTML = items.length ? items.map(item => {
        const width = Math.max(4, Math.round((item.number / max) * 100));
        const tone = item.number >= 1.5 ? "var(--good)" : item.number >= 1 ? "var(--accent)" : "var(--danger)";
        return `
          <tr>
            <td class="rank">#${item.rank}</td>
            <td class="player" title="${item.name}">${item.name}</td>
            <td class="value" style="color:${tone}">${item.value}</td>
            <td class="bar-cell"><div class="bar"><i style="--w:${width}%"></i></div></td>
          </tr>
        `;
      }).join("") : `<tr><td colspan="4" class="empty">Позывной не найден.</td></tr>`;
    }

    function renderPodium() {
      document.getElementById("podium").innerHTML = modes.map(mode => {
        const leader = (appData.ratings[mode.key] || [])[0];
        if (!leader) return "";
        return `
          <div class="podium-item">
            <div class="medal">#${leader.rank}</div>
            <div>
              <div class="podium-name">${leader.name}</div>
              <div class="podium-mode">${mode.label}</div>
            </div>
            <strong class="value">${leader.value}</strong>
          </div>
        `;
      }).join("");
    }

    function renderStats() {
      const items = appData.stats[activeStat] || [];
      const stat = statModes.find(item => item.key === activeStat);
      document.getElementById("statValueHead").textContent = stat.label;
      document.getElementById("statRows").innerHTML = items.slice(0, 12).map(item => `
        <tr>
          <td class="rank">#${item.rank}</td>
          <td class="player" title="${item.name}">${item.name}</td>
          <td class="value">${item.value}</td>
        </tr>
      `).join("");
    }

    function renderAdmins() {
      document.getElementById("admins").innerHTML = appData.admins.length ? appData.admins.map(item => `
        <div class="info-row">
          <span>${item.role}</span>
          <strong title="${item.name}">${item.name}</strong>
        </div>
      `).join("") : `<div class="empty">Нет данных.</div>`;
    }

    function renderAll() {
      renderTabs();
      renderSummary();
      renderLeader();
      renderRating();
      renderPodium();
      renderStats();
      renderAdmins();
    }

    async function boot() {
      let text = SOURCE_CSV;
      try {
        const response = await fetch(SHEET_CSV, { cache: "no-store" });
        if (!response.ok) throw new Error("sheet unavailable");
        text = await response.text();
        document.getElementById("syncStatus").textContent = "Данные из Google Sheets";
      } catch (error) {
        document.getElementById("syncStatus").textContent = "Встроенный снимок данных";
      }

      appData = normalize(parseCsv(text));
      renderAll();
    }

    document.addEventListener("click", event => {
      const modeButton = event.target.closest("[data-mode]");
      const statButton = event.target.closest("[data-stat]");
      if (modeButton) {
        activeMode = modeButton.dataset.mode;
        renderAll();
      }
      if (statButton) {
        activeStat = statButton.dataset.stat;
        renderAll();
      }
    });

    document.getElementById("search").addEventListener("input", renderRating);
    boot();
  </script>
